name: PHPStan

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]

jobs:
  phpstan-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP with PHPStan
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: phpstan

      - name: Install PHPStan with extensions
        run: |
            composer require --dev phpstan/phpstan phpstan/phpstan-strict-rules

      - name: Run PHPStan
        run: vendor/bin/phpstan analyze -c .phpstan/phpstan.neon -v
